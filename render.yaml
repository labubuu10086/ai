databases:
  - name: serial-story-studio-db
    plan: free
    databaseName: serial_story_studio
    user: serial_story_studio

services:
  - type: web
    name: serial-story-studio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 4 --timeout 180 --graceful-timeout 30
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "85"
      - key: GEN1_BASE_URL
        value: https://api.openai.com/v1
      - key: GEN1_API_KEY
        sync: false
      - key: GEN1_MODEL
        sync: false
      - key: GEN2_BASE_URL
        sync: false
      - key: GEN2_API_KEY
        sync: false
      - key: GEN2_MODEL
        sync: false
      - key: ARCHIVE_DATABASE_URL
        fromDatabase:
          name: serial-story-studio-db
          property: connectionString
