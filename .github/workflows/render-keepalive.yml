name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Validate keepalive URL
        env:
          RENDER_PING_URL: ${{ secrets.RENDER_PING_URL }}
        run: |
          if [ -z "$RENDER_PING_URL" ]; then
            echo "Missing secret: RENDER_PING_URL"
            exit 1
          fi

      - name: Ping Render health check
        env:
          RENDER_PING_URL: ${{ secrets.RENDER_PING_URL }}
        run: |
          curl --fail --silent --show-error --location --max-time 30 --retry 2 "$RENDER_PING_URL"
